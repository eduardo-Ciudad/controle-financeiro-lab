spring.application.name=financialcontrol

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/controlefinanceiro_lab}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true

jwt.secret=${JWT_SECRET:dev-only-secret-do-not-use-in-production-1234567890}
jwt.expiracao-ms=86400000

cors.origins=${CORS_ORIGINS:http://127.0.0.1:5500}